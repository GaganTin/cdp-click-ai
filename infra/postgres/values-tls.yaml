# TLS overlay for the `cdp-ai-postgres` Bitnami chart (postgresql-18.6.7, PG 18.4).
#
# Apply with --reuse-values so the existing auth/resources/extendedConfiguration
# from release revision 2 are preserved and only the TLS bits are added:
#
#   helm upgrade cdp-ai-postgres <SAME-CHART-SOURCE-AS-ORIGINAL> \
#     --version 18.6.7 -n cdp-ai --reuse-values -f infra/postgres/values-tls.yaml
#
# <SAME-CHART-SOURCE-AS-ORIGINAL> is whatever you installed from, e.g.
#   oci://registry-1.docker.io/bitnamicharts/postgresql
#
# This is a passthrough (L4) LoadBalancer, so TLS terminates at Postgres itself —
# no change to the `cdp-ai-postgres-public` Service is needed.

tls:
  enabled: true
  autoGenerated: true   # self-signed server cert + CA -> secret `cdp-ai-postgres-crt`
                        # NOTE: regenerated on every `helm upgrade`. Fine for
                        # sslmode=require/no-verify (no CA pinning). For verify-full
                        # use a stable cert (cert-manager / provided secret) instead.

primary:
  # password_encryption is already scram-sha-256, so existing roles (cdpAdmin,
  # postgres, app/airflow) keep working with no password reset.
  #
  # local socket + loopback (used by the chart's liveness/readiness probes) do NOT
  # require SSL; every real *network* client does.
  #
  # ── PHASE 1 (enable, do NOT enforce yet) ── use these two lines first so existing
  #    sslmode=disable clients keep connecting while you migrate them:
  #
  #   host      all   all   0.0.0.0/0        scram-sha-256
  #   host      all   all   ::/0             scram-sha-256
  #
  # ── PHASE 2 (enforce) ── after all clients are confirmed on SSL, switch those two
  #    lines to `hostssl` (as below) and re-run the upgrade. Non-SSL is then rejected.
  pgHbaConfiguration: |
    local     all   all                    scram-sha-256
    host      all   all   127.0.0.1/32     scram-sha-256
    host      all   all   ::1/128          scram-sha-256
    hostssl   all   all   0.0.0.0/0        scram-sha-256
    hostssl   all   all   ::/0             scram-sha-256
